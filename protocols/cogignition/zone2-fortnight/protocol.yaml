# Zone 2 Base with Fortnight HRV Gate.
#
# Live, author-maintained version of the spec example. Edits land via PR
# to cogignition/protocols. CI validates against
# cogignition/hegemonikron-spec.

apiVersion: hegemonikron.cogignition.cloud/v1
kind: Protocol

metadata:
  id: zone2-fortnight
  title: "Zone 2 Base with Fortnight HRV Gate"
  author: cogignition
  license: CC-BY-4.0
  created: "2026-05-03"
  version: "0.1"
  description: >
    14-day rolling HRV baseline gates above-Zone-2 work. Zone 4 / Zone 5
    sessions are unlocked only when the day's HRV is within 85% of the
    fortnight mean and last night's sleep is at least 6 hours.
    Two-a-days are permitted when the morning brief returns
    full_protocol; the evening session is capped at Zone 3 regardless.

    Built on Galpin / Norton periodization principles plus the carb
    periodization framework (Impey et al. 2018, "Fuel for the Work
    Required").
  references:
    - https://blog.cogignition.cloud/notes/2026-04-19-galpin-summary/
    - https://protocols.cogignition.cloud/cogignition/zone2-fortnight/
    - https://github.com/cogignition/hegemonikron-spec

# Inputs declare what data the protocol reads. Each entry maps a local
# name to a metric query against the canonical vocabulary
# (cogignition/hegemonikron-spec/schema/vocabulary.yaml). The runtime
# resolves these via the user's sources.yaml configuration.
inputs:
  hrv_today:
    metric: hrv
    aggregation: latest

  hrv_baseline:
    metric: hrv
    aggregation: mean
    window: 14d

  sleep_hours:
    metric: sleep_total
    aggregation: latest

  sleep_deep_hours:
    metric: sleep_deep
    aggregation: latest

  resting_hr_today:
    metric: resting_heart_rate
    aggregation: latest

  resting_hr_baseline:
    metric: resting_heart_rate
    aggregation: mean
    window: 14d

  workouts_today:
    metric: workout
    aggregation: list
    window: today

  protein_today:
    metric: protein
    aggregation: sum
    window: today

  carbohydrates_today:
    metric: carbohydrates
    aggregation: sum
    window: today

  steps_today:
    metric: step_count
    aggregation: sum
    window: today

  active_energy_today:
    metric: active_energy
    aggregation: sum
    window: today

# Exercises this protocol can recommend. Workflows narrow the eligible
# subset via `recommend: [id, ...]` on rule decisions; the runtime's
# edge model picks one given the current context.
exercises:
  - id: rest
    label: "Rest the rest of today"
    description: "No structured exercise — passive recovery."
    duration_min: 0
    intensity: none
    fatigue: none

  - id: walk30
    label: "30-min easy walk"
    description: "Outdoor or treadmill walk at conversational pace."
    duration_min: 30
    intensity: zone_1
    fatigue: minimal
    modality: walk

  - id: mobility20
    label: "20-min mobility flow"
    description: "Hip openers, thoracic mobility, ankle work, light core."
    duration_min: 20
    intensity: zone_1
    fatigue: minimal
    modality: mobility

  - id: z2_ride45
    label: "45-min Zone 2 ride"
    description: "Steady aerobic ride at the high end of Zone 2."
    duration_min: 45
    intensity: zone_2
    fatigue: low
    modality: bike

  - id: z2_ride75
    label: "75-min Zone 2 ride"
    description: "Longer aerobic ride; treat as a base session."
    duration_min: 75
    intensity: zone_2
    fatigue: medium
    modality: bike
    when: "fed within the last 90 min and >300 kcal in the bank"

  - id: strength_pull
    label: "Strength: pull day"
    description: "Compound pulls (rows, pulldowns, RDL) plus assistance."
    duration_min: 60
    intensity: anaerobic
    fatigue: high
    modality: strength

  - id: strength_push
    label: "Strength: push day"
    description: "Compound pushes (bench, OHP, dips) plus assistance."
    duration_min: 60
    intensity: anaerobic
    fatigue: high
    modality: strength

  - id: hiit_intervals20
    label: "20-min Zone 4/5 intervals"
    description: "Hard intervals; only when full_protocol is unlocked AND fueled."
    duration_min: 20
    intensity: zone_4_5
    fatigue: very_high
    modality: bike
    when: "≥150g carbs in the day and HRV at or above baseline"

# Views declare deterministic chart specs. Workflow rules can surface
# specific views by id; runtimes that support charting render them via
# Swift Charts (or any equivalent toolkit). The math (bucketing, rolling
# baselines, bands) is fully described here — runtimes don't synthesize
# new transformations.
views:

  - id: hrv_trend
    title: "HRV — 14d trend vs fortnight baseline"
    kind: line
    window: { duration: 14d, step: 1d }
    series:
      - metric: hrv
        aggregate: daily_mean
        style: { role: primary }
      - derived: rolling_mean
        of: hrv
        window: 14d
        style: { role: baseline, dash: true }
      - derived: rolling_band
        of: hrv
        window: 14d
        kind: stddev
        k: 1.0
        style: { role: band, opacity: 0.15 }
    axes:
      x: { kind: time, format: "M.d" }
      y: { kind: numeric, unit: ms, zero: false }

  - id: sleep_stages
    title: "Sleep stages — last 7 nights"
    kind: stacked_bar
    window: { duration: 7d, step: 1d }
    series:
      - metric: sleep_total
        aggregate: sum
        group_by: stage
    axes:
      x: { kind: time, format: "EEE" }
      y: { kind: numeric, unit: min }

  - id: rhr_drift
    title: "Resting HR — drift vs baseline"
    kind: line
    window: { duration: 14d, step: 1d }
    series:
      - metric: resting_heart_rate
        aggregate: daily_mean
        style: { role: primary }
      - derived: rolling_mean
        of: resting_heart_rate
        window: 14d
        style: { role: baseline, dash: true }
    annotations:
      - kind: rule_h
        value_from: { protocol_input: resting_hr_baseline, offset: 5 }
        label: "+5 bpm gate"
        style: { role: warning }
    axes:
      x: { kind: time, format: "M.d" }
      y: { kind: numeric, unit: bpm, zero: false }

# Workflows describe triggerable behaviors. A runtime (skill, app, or
# routine) consumes the cadence and inputs, evaluates rules, and
# produces output. Each workflow is independent; protocols can mix many.
workflows:

  morning_readiness:
    cadence: daily@07:30
    inputs:
      - hrv_today
      - hrv_baseline
      - sleep_hours
      - resting_hr_today
      - resting_hr_baseline
    views:
      - hrv_trend
    rules:
      - if: "hrv_today / hrv_baseline < 0.85"
        then:
          intensity_cap: zone_2_only
          dominant_signal: hrv
          reason: "HRV below 85% of fortnight baseline"
          views: [hrv_trend, sleep_stages]
      - if: "sleep_hours < 6"
        then:
          intensity_cap: cap_at_zone_3
          dominant_signal: sleep
          reason: "Sleep deficit; recovery insufficient for above-aerobic work"
          views: [sleep_stages, hrv_trend]
      - if: "resting_hr_today > resting_hr_baseline + 5"
        then:
          intensity_cap: cap_at_zone_3
          dominant_signal: rhr
          reason: "Resting HR elevated >5bpm vs baseline; possible accumulating fatigue"
          views: [rhr_drift, hrv_trend]
      - else:
          intensity_cap: full_protocol
          dominant_signal: composite
          reason: "All recovery markers within range"
          views: [hrv_trend]
    output:
      style: "morning brief, 3 sentences, no filler, no hedging"
      mention:
        - dominant_signal
        - intensity_cap
        - reason

  evening_check:
    cadence: daily@20:00
    inputs:
      - workouts_today
      - protein_today
      - carbohydrates_today
    rules:
      - if: "len(workouts_today) >= 2"
        then:
          status: two_a_day_complete
          note: "Cap evening intensity at Zone 3 regardless of morning brief"
      - if: "protein_today < 120"
        then:
          status: protein_gap
          note: "Hit 120g protein target before sleep"
      - else:
          status: on_track
    output:
      style: "evening check-in, 2 sentences"
      mention:
        - status
        - note

  in_flight_check:
    cadence: on_demand
    inputs:
      - hrv_today
      - hrv_baseline
      - sleep_hours
      - resting_hr_today
      - resting_hr_baseline
      - workouts_today
      - protein_today
      - carbohydrates_today
      - steps_today
      - active_energy_today
    views:
      - hrv_trend
    rules:
      - if: "hrv_today / hrv_baseline < 0.85"
        then:
          intensity_cap: zone_2_only
          dominant_signal: hrv
          reason: "HRV below 85% of fortnight baseline"
          recommend: [rest, walk30, mobility20, z2_ride45]
          views: [hrv_trend]
      - if: "len(workouts_today) >= 2"
        then:
          intensity_cap: rest
          dominant_signal: workload
          reason: "Two-a-day already complete; cap further work"
          recommend: [rest, walk30, mobility20]
      - if: "sleep_hours < 6"
        then:
          intensity_cap: cap_at_zone_3
          dominant_signal: sleep
          reason: "Sleep deficit; recovery insufficient for above-aerobic work"
          recommend: [walk30, mobility20, z2_ride45]
          views: [sleep_stages, hrv_trend]
      - if: "resting_hr_today > resting_hr_baseline + 5"
        then:
          intensity_cap: cap_at_zone_3
          dominant_signal: rhr
          reason: "Resting HR elevated >5bpm vs baseline; possible accumulating fatigue"
          recommend: [walk30, mobility20, z2_ride45]
          views: [rhr_drift, hrv_trend]
      - if: "carbohydrates_today < 100 and len(workouts_today) == 0"
        then:
          intensity_cap: zone_2_only
          dominant_signal: fueling
          reason: "Under-fueled for above-aerobic work today"
          recommend: [walk30, mobility20, z2_ride45]
      - else:
          intensity_cap: full_protocol
          dominant_signal: composite
          reason: "Recovery markers within range, fueled, capacity available"
          recommend: [z2_ride45, z2_ride75, strength_pull, strength_push, hiit_intervals20]
    output:
      style: "live readiness check, 2-3 sentences. Pick exactly ONE recommendation from the eligible list and explain why given the current time of day, what's already been done, and current fueling. Do not invent options outside the list."
      mention:
        - dominant_signal
        - reason

  post_workout_debrief:
    cadence: on_workout_complete
    inputs:
      - workouts_today
      - hrv_today
    rules:
      - else:
          phase: review
    output:
      style: "post-workout analysis, 4-6 sentences"
      mention:
        - workouts_today
        - intensity_cap
