name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages requires both `pages: write` and `id-token: write` for the
# official deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy in flight at a time; supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install deps
        run: pip install pyyaml jsonschema

      - name: validate (same checks as validate.yml; fail fast before render)
        env:
          SPEC_REF: main
        run: python tools/validate.py

      - name: render catalog → dist/
        run: python site/render.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
